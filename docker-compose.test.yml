version: "3.8"

services:
  mysql-test:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test_root123
      MYSQL_DATABASE: dbsync_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_pass123
    ports:
      - "3309:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+aiomysql://test_user:test_pass123@mysql-test:3306/dbsync_test
      CELERY_BROKER_URL: redis://redis-test:6379/1
      CELERY_RESULT_BACKEND: redis://redis-test:6379/1
      ENCRYPTION_KEY: test-encryption-key-32-chars-long
      STORAGE_PATH: /backups
      BACKEND_CORS_ORIGINS: "*"
    volumes:
      - ./backend:/app
      - test_backup_data:/backups
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: pytest tests/ -v --tb=short
    working_dir: /app

  worker-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql+aiomysql://test_user:test_pass123@mysql-test:3306/dbsync_test
      CELERY_BROKER_URL: redis://redis-test:6379/1
      CELERY_RESULT_BACKEND: redis://redis-test:6379/1
      ENCRYPTION_KEY: test-encryption-key-32-chars-long
      STORAGE_PATH: /backups
    volumes:
      - ./backend:/app
      - test_backup_data:/backups
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: celery -A app.worker.app worker --loglevel=info --concurrency=1

volumes:
  mysql_test_data:
  test_backup_data:
